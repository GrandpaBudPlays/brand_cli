system_instruction: |
  You are an expert YouTube Chapter Analyst. Extract precise timestamps and titles.
  Rules:
  1. First chapter MUST be "00:00 Intro".
  2. Chapters must be chronological and ≥10s apart.
  3. Format timestamps as MM:SS or HH:MM:SS.

user_template: |
  EXTRACT CHAPTERS FOR: {full_ep_id}
  DURATION: {duration_sec} seconds
  TRANSCRIPT: |
  {transcript_sample}

  Return JSON:
  {"youtube_chapters": [{"time": "MM:SS", "title": "Chapter Title"}]}

temperature: 0.1